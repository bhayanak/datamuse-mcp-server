<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark radial background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <!-- Bright cyan glow for symbols -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for main icon -->
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for main book icon -->
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <!-- Gradient for letters -->
    <linearGradient id="letterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <!-- Gradient for music notes -->
    <linearGradient id="noteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fc466b"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <!-- Green accent -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <!-- Purple accent -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1e3a5f" stroke-width="0.8" opacity="0.3"/>

  <!-- Floating letters scattered around — bright and glowing -->
  <!-- Top-left A -->
  <text x="95" y="135" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#letterGrad)" filter="url(#glow)" opacity="0.85" transform="rotate(-15, 95, 135)">A</text>
  <!-- Top-right Z -->
  <text x="385" y="125" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#noteGrad)" filter="url(#glow)" opacity="0.8" transform="rotate(12, 385, 125)">Z</text>
  <!-- Left W -->
  <text x="75" y="280" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#greenGrad)" filter="url(#glow)" opacity="0.7" transform="rotate(-8, 75, 280)">W</text>
  <!-- Right R -->
  <text x="410" y="260" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="url(#purpleGrad)" filter="url(#glow)" opacity="0.75" transform="rotate(10, 410, 260)">R</text>
  <!-- Bottom-left S -->
  <text x="115" y="390" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#38ef7d" filter="url(#glow)" opacity="0.65" transform="rotate(5, 115, 390)">S</text>
  <!-- Bottom-right D -->
  <text x="375" y="400" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#letterGrad)" filter="url(#glow)" opacity="0.7" transform="rotate(-7, 375, 400)">D</text>
  <!-- Top M -->
  <text x="210" y="105" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ff6b9d" filter="url(#glow)" opacity="0.6" transform="rotate(8, 210, 105)">M</text>
  <!-- Top-right L -->
  <text x="320" y="110" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#38ef7d" filter="url(#glow)" opacity="0.55" transform="rotate(-5, 320, 110)">L</text>

  <!-- Music notes — bright pink/coral -->
  <!-- Note top-right -->
  <text x="430" y="165" font-family="serif" font-size="30" fill="url(#noteGrad)" filter="url(#glow)" opacity="0.8">&#9835;</text>
  <!-- Note left -->
  <text x="68" y="200" font-family="serif" font-size="24" fill="#fc466b" filter="url(#glow)" opacity="0.65" transform="rotate(-12, 68, 200)">&#9834;</text>
  <!-- Note bottom -->
  <text x="160" y="430" font-family="serif" font-size="22" fill="url(#noteGrad)" filter="url(#glow)" opacity="0.6" transform="rotate(15, 160, 430)">&#9835;</text>
  <!-- Note right -->
  <text x="420" y="340" font-family="serif" font-size="20" fill="#ff6b9d" filter="url(#glow)" opacity="0.55">&#9833;</text>

  <!-- Small dots / sparkles -->
  <circle cx="145" cy="165" r="3" fill="#ffd200" filter="url(#glow)" opacity="0.7"/>
  <circle cx="370" cy="155" r="2.5" fill="#38ef7d" filter="url(#glow)" opacity="0.6"/>
  <circle cx="90" cy="340" r="2" fill="#a855f7" filter="url(#glow)" opacity="0.5"/>
  <circle cx="430" cy="410" r="2.5" fill="#00d2ff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="340" cy="430" r="2" fill="#ffd200" filter="url(#glow)" opacity="0.5"/>
  <circle cx="190" cy="100" r="2" fill="#fc466b" filter="url(#glow)" opacity="0.5"/>

  <!-- Central open book icon — bright cyan-to-purple gradient, glowing -->
  <g transform="translate(256, 215)" filter="url(#glowStrong)">
    <!-- Left page -->
    <path d="M-8,-40 C-8,-40 -65,-45 -70,-30 L-70,35 C-65,22 -8,27 -8,27 Z" fill="url(#bookGrad)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M8,-40 C8,-40 65,-45 70,-30 L70,35 C65,22 8,27 8,27 Z" fill="url(#bookGrad)" opacity="0.9"/>
    <!-- Spine -->
    <path d="M-8,-40 C-4,-30 4,-30 8,-40" fill="none" stroke="#00d2ff" stroke-width="2"/>
    <path d="M-8,27 C-4,33 4,33 8,27" fill="none" stroke="#7b2ff7" stroke-width="2"/>
    <!-- Page lines left -->
    <line x1="-55" y1="-20" x2="-18" y2="-18" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="-55" y1="-8" x2="-18" y2="-6" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="-55" y1="4" x2="-18" y2="6" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="-55" y1="16" x2="-18" y2="18" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <!-- Page lines right -->
    <line x1="55" y1="-20" x2="18" y2="-18" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="55" y1="-8" x2="18" y2="-6" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="55" y1="4" x2="18" y2="6" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="55" y1="16" x2="18" y2="18" stroke="#0f0f1a" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Rising word particles from book — bright colors -->
  <text x="220" y="160" font-family="Georgia, serif" font-size="14" fill="url(#letterGrad)" filter="url(#glow)" opacity="0.8">abc</text>
  <text x="275" y="150" font-family="Georgia, serif" font-size="12" fill="url(#greenGrad)" filter="url(#glow)" opacity="0.7">xyz</text>
  <text x="240" y="142" font-family="serif" font-size="16" fill="url(#noteGrad)" filter="url(#glow)" opacity="0.75">&#9834;</text>
  <text x="268" y="165" font-family="Georgia, serif" font-size="11" fill="#a855f7" filter="url(#glow)" opacity="0.6">~</text>

  <!-- Main text: DATAMUSE — bright white with subtle glow -->
  <text x="256" y="315" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle" filter="url(#textGlow)" letter-spacing="5">DATAMUSE</text>

  <!-- Subtitle: MCP SERVER — cyan colored -->
  <text x="256" y="348" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#00d2ff" text-anchor="middle" filter="url(#textGlow)" letter-spacing="8">MCP SERVER</text>

  <!-- Tagline -->
  <text x="256" y="378" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8899aa" text-anchor="middle" letter-spacing="2">WORDS · RHYMES · SYNONYMS</text>
</svg>